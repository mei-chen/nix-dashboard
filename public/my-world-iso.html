<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nix's World</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    canvas { display: block; }

    #panel {
      position: fixed;
      top: max(12px, env(safe-area-inset-top, 12px));
      left: max(12px, env(safe-area-inset-left, 12px));
      background: linear-gradient(145deg, rgba(10, 14, 10, 0.96) 0%, rgba(6, 10, 8, 0.94) 100%);
      border: 1px solid rgba(0, 255, 0, 0.5);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.6),
        0 0 32px rgba(0, 255, 0, 0.08),
        inset 0 1px 0 rgba(0, 255, 100, 0.04);
      padding: 18px 22px 20px;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      z-index: 10;
      width: min(420px, calc(100vw - 24px));
      max-width: calc(100% - 8px);
    }
    #panel-title {
      font-size: 18px;
      font-weight: bold;
      color: #00FF00;
      margin-bottom: 4px;
      letter-spacing: 0.1em;
      text-shadow: 0 0 18px rgba(0, 255, 0, 0.35);
    }
    #panel-sub {
      font-size: 13px;
      color: #6b9a6b;
      text-transform: none;
      letter-spacing: 0.03em;
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .p-row { display: flex; gap: 12px; margin: 8px 0; line-height: 1.5; align-items: baseline; }
    .p-label { color: #7aaf7a; min-width: 92px; flex-shrink: 0; font-size: 13px; }
    .p-val {
      color: #d8ead8;
      text-transform: none;
      letter-spacing: 0.02em;
      flex: 1;
      word-break: break-word;
    }
    #panel hr {
      border: none;
      border-top: 1px solid rgba(0, 255, 0, 0.18);
      margin: 12px 0 10px;
    }

    #room-info {
      position: fixed;
      bottom: max(16px, env(safe-area-inset-bottom, 16px));
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(10, 14, 10, 0.96) 0%, rgba(6, 10, 8, 0.94) 100%);
      border: 1px solid rgba(0, 255, 0, 0.3);
      padding: 14px 20px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      z-index: 10;
      width: calc(100vw - 24px);
      max-width: 560px;
      min-width: 0;
      text-align: center;
      box-sizing: border-box;
      display: none;
    }
    #room-info.active { display: block; }
    #ri-name { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    #ri-desc { color: #9a9a9a; font-size: 15px; text-transform: none; margin-bottom: 8px; }
    #ri-objects { color: #b0b0b0; font-size: 15px; text-transform: none; line-height: 1.55; }

    #back {
      position: fixed;
      top: max(12px, env(safe-area-inset-top, 12px));
      right: max(12px, env(safe-area-inset-right, 12px));
      color: #00FF00;
      font-size: 14px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 1px solid rgba(0, 255, 0, 0.55);
      padding: 12px 16px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      z-index: 10;
      background: rgba(8, 12, 8, 0.88);
      transition: background 0.15s, color 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    #back:hover {
      background: rgba(0, 255, 0, 0.14);
      color: #99ff99;
      border-color: #00FF00;
      box-shadow: 0 0 16px rgba(0, 255, 0, 0.15);
    }

    #hint {
      position: fixed;
      bottom: max(12px, env(safe-area-inset-bottom, 12px));
      right: max(12px, env(safe-area-inset-right, 12px));
      color: #4a7a4a;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      z-index: 10;
      max-width: 42vw;
      line-height: 1.3;
      text-align: right;
    }
    @media (max-width: 600px) {
      #hint {
        display: none;
      }
      #ri-name { font-size: 16px; }
      #ri-desc, #ri-objects { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="panel">
    <div id="panel-title">◆ Nix is here</div>
    <div id="panel-sub">Live state</div>
    <div class="p-row"><span class="p-label">Room</span><span class="p-val" id="s-loc">...</span></div>
    <div class="p-row"><span class="p-label">Doing</span><span class="p-val" id="s-act">...</span></div>
    <div class="p-row"><span class="p-label">Mood</span><span class="p-val" id="s-mood">...</span></div>
    <hr>
    <div class="p-row"><span class="p-label">Last moved</span><span class="p-val" id="s-moved">...</span></div>
  </div>

  <div id="room-info">
    <div id="ri-name"></div>
    <div id="ri-desc"></div>
    <div id="ri-objects"></div>
  </div>

  <a href="/" id="back">← Dashboard</a>
  <div id="hint">Tap room · Tap empty to center</div>

  <canvas id="canvas"></canvas>

  <script>
  (function () {
    'use strict';

    // -----------------------------------------------------------------------
    // Config
    // -----------------------------------------------------------------------

    var RW = 260, RH = 170;
    var CORRIDOR = 32;
    var GRID = 26;
    var WALL = 3;
    var POLL_MS = 10000;

    var ROOMS = {
      observatory: { x: 500, y: 80,  name: 'Observatory', floor: '#12122e', accent: '#7755dd', wall: '#4a3a7a' },
      library:     { x: 160, y: 300, name: 'Library',     floor: '#1e1810', accent: '#cc9944', wall: '#5a4a2a' },
      hearth:      { x: 500, y: 300, name: 'Hearth',      floor: '#221408', accent: '#ff6b35', wall: '#5a3018' },
      studio:      { x: 840, y: 300, name: 'Studio',      floor: '#0e1228', accent: '#4488ff', wall: '#2a3a6a' },
      garden:      { x: 500, y: 520, name: 'Garden',      floor: '#0e1e0e', accent: '#44cc44', wall: '#2a5a2a' },
      workshop:    { x: 840, y: 520, name: 'Workshop',    floor: '#181818', accent: '#999999', wall: '#484848' },
    };

    var CORRIDORS = [
      ['observatory', 'hearth',   'v'],
      ['library',     'hearth',   'h'],
      ['hearth',      'studio',   'h'],
      ['hearth',      'garden',   'v'],
      ['garden',      'workshop', 'h'],
    ];

    /** Map key → same label as on the canvas; otherwise title-case free text. */
    function roomLabel(key) {
      if (!key) return '…';
      var r = ROOMS[key];
      if (r) return r.name;
      var s = String(key).replace(/_/g, ' ').trim();
      if (!s.length) return '…';
      return s.replace(/\b\w/g, function (c) { return c.toUpperCase(); });
    }

    var OBJ_LOOK = {
      ember:     { ch: '*', col: '#FF6B35' },
      fire:      { ch: '✦', col: '#FF4500' },
      note:      { ch: '=', col: '#FFDD44' },
      book:      { ch: '≡', col: '#CC9944' },
      project:   { ch: '>', col: '#4488FF' },
      plant:     { ch: '+', col: '#44CC44' },
      tool:      { ch: '#', col: '#999999' },
      window:    { ch: '□', col: '#88AAEE' },
      telescope: { ch: '◎', col: '#9966DD' },
      desk:      { ch: '▭', col: '#5577AA' },
      workbench: { ch: '▬', col: '#888888' },
      warmth:    { ch: '~', col: '#FF8844' },
    };

    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------

    var DEFAULT_WORLD = {
      current_location: 'hearth',
      activity: 'resting',
      mood: 'contemplative',
      last_moved: new Date().toISOString(),
      last_update: new Date().toISOString(),
      rooms: {
        hearth:      { name: 'The Hearth',      description: 'A warm center. The ember glows here.', objects: [{ type: 'fire' }, { type: 'warmth' }, { type: 'note' }] },
        library:     { name: 'The Library',      description: 'Shelves of accumulated knowledge.',      objects: [{ type: 'book' }, { type: 'book' }, { type: 'book' }] },
        studio:      { name: 'The Studio',       description: 'Where ideas become projects.',           objects: [{ type: 'project' }, { type: 'desk' }] },
        observatory: { name: 'The Observatory',  description: 'A quiet place to watch the world.',      objects: [{ type: 'window' }, { type: 'telescope' }] },
        garden:      { name: 'The Garden',       description: 'Things grow slowly here.',                objects: [{ type: 'plant' }, { type: 'plant' }] },
        workshop:    { name: 'The Workshop',     description: 'Tools and experiments.',                  objects: [{ type: 'tool' }, { type: 'workbench' }] },
      },
    };

    var world = DEFAULT_WORLD;
    var canvas = document.getElementById('canvas');
    var ctx = canvas.getContext('2d');
    var camX = 0, camY = 0, tCamX = 0, tCamY = 0;
    var nixX = 500, nixY = 300, tNixX = 500, tNixY = 300;
    var hovered = null, selected = null;
    var frame = 0;
    var parts = [];
    var lastMove = 0;
    var lastTouchPick = 0;

    // -----------------------------------------------------------------------
    // Setup
    // -----------------------------------------------------------------------

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Snap camera immediately (no easing from origin)
    tCamX = camX = canvas.width / 2 - 500;
    tCamY = camY = canvas.height / 2 - 300;

    // -----------------------------------------------------------------------
    // Camera
    // -----------------------------------------------------------------------

    function panTo(wx, wy) {
      tCamX = canvas.width / 2 - wx;
      tCamY = canvas.height / 2 - wy;
    }

    function updateCam() {
      camX += (tCamX - camX) * 0.06;
      camY += (tCamY - camY) * 0.06;
    }

    // -----------------------------------------------------------------------
    // Helpers
    // -----------------------------------------------------------------------

    function rr(key) {
      var r = ROOMS[key];
      return { x: r.x - RW / 2, y: r.y - RH / 2, w: RW, h: RH };
    }

    function isCurrent(key) {
      return world && world.current_location === key;
    }

    // -----------------------------------------------------------------------
    // Rendering
    // -----------------------------------------------------------------------

    function drawGlows() {
      for (var key in ROOMS) {
        var r = ROOMS[key];
        var radius = isCurrent(key) ? RW * 1.2 : RW * 0.85;
        var alpha = isCurrent(key) ? 0.25 : 0.14;
        var hex = r.accent;
        var rr2 = parseInt(hex.slice(1, 3), 16);
        var gg = parseInt(hex.slice(3, 5), 16);
        var bb = parseInt(hex.slice(5, 7), 16);
        var grd = ctx.createRadialGradient(
          r.x + camX, r.y + camY, 10,
          r.x + camX, r.y + camY, radius
        );
        grd.addColorStop(0, 'rgba(' + rr2 + ',' + gg + ',' + bb + ',' + alpha + ')');
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(r.x + camX - radius, r.y + camY - radius, radius * 2, radius * 2);
      }
    }

    function drawCorridors() {
      ctx.fillStyle = '#161616';
      CORRIDORS.forEach(function (c) {
        var a = ROOMS[c[0]], b = ROOMS[c[1]];
        if (c[2] === 'h') {
          var sx = Math.min(a.x, b.x) + RW / 2;
          var ex = Math.max(a.x, b.x) - RW / 2;
          var cy2 = (a.y + b.y) / 2 - CORRIDOR / 2;
          ctx.fillRect(sx + camX, cy2 + camY, ex - sx, CORRIDOR);
        } else {
          var sy = Math.min(a.y, b.y) + RH / 2;
          var ey = Math.max(a.y, b.y) - RH / 2;
          var cx2 = (a.x + b.x) / 2 - CORRIDOR / 2;
          ctx.fillRect(cx2 + camX, sy + camY, CORRIDOR, ey - sy);
        }
      });
    }

    function drawRooms() {
      for (var key in ROOMS) {
        var r = ROOMS[key];
        var b = rr(key);
        var sx = b.x + camX, sy = b.y + camY;
        var cur = isCurrent(key);
        var hov = hovered === key;
        var sel = selected === key;

        // Floor
        ctx.fillStyle = r.floor;
        ctx.fillRect(sx, sy, b.w, b.h);

        // Floor grid
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        for (var gx = GRID; gx < b.w; gx += GRID) {
          ctx.beginPath(); ctx.moveTo(sx + gx, sy); ctx.lineTo(sx + gx, sy + b.h); ctx.stroke();
        }
        for (var gy = GRID; gy < b.h; gy += GRID) {
          ctx.beginPath(); ctx.moveTo(sx, sy + gy); ctx.lineTo(sx + b.w, sy + gy); ctx.stroke();
        }

        // Walls
        ctx.strokeStyle = sel || cur ? r.accent : hov ? '#666' : r.wall;
        ctx.lineWidth = WALL;
        ctx.strokeRect(sx, sy, b.w, b.h);

        // Label
        ctx.font = 'bold 15px Courier New';
        ctx.textAlign = 'center';
        ctx.fillStyle = cur ? r.accent : '#777';
        ctx.fillText(r.name.toUpperCase(), r.x + camX, sy - 12);

        if (cur) {
          ctx.fillStyle = r.accent;
          ctx.font = '12px Courier New';
          ctx.fillText('\u25C6 NIX IS HERE', r.x + camX, sy - 28);
        }
      }
    }

    function drawObjects() {
      if (!world) return;

      for (var key in ROOMS) {
        var room = world.rooms && world.rooms[key];
        if (!room || !room.objects) continue;

        var b = rr(key);
        var objs = room.objects;
        var cols = Math.min(objs.length, 5);
        var rows = Math.ceil(objs.length / cols);
        var padX = 36, padY = 36;
        var spacingX = cols > 1 ? (b.w - padX * 2) / (cols - 1) : 0;
        var spacingY = rows > 1 ? Math.min(28, (b.h - padY * 2) / (rows - 1)) : 0;
        var startY = b.y + padY + (b.h - padY * 2 - (rows - 1) * spacingY) / 2;

        objs.forEach(function (obj, i) {
          var col = i % cols;
          var row = Math.floor(i / cols);
          var ox = b.x + padX + col * spacingX + camX;
          var oy = startY + row * spacingY + camY;
          var look = OBJ_LOOK[obj.type] || OBJ_LOOK.note;

          // Glow
          var hex = look.col;
          var cr = parseInt(hex.slice(1, 3), 16);
          var cg = parseInt(hex.slice(3, 5), 16);
          var cb = parseInt(hex.slice(5, 7), 16);
          var grd = ctx.createRadialGradient(ox, oy, 0, ox, oy, 18);
          grd.addColorStop(0, 'rgba(' + cr + ',' + cg + ',' + cb + ',0.35)');
          grd.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = grd;
          ctx.fillRect(ox - 18, oy - 18, 36, 36);

          // Icon
          ctx.font = 'bold 16px Courier New';
          ctx.textAlign = 'center';
          ctx.fillStyle = look.col;
          ctx.fillText('[' + look.ch + ']', ox, oy + 4);
        });
      }
    }

    function drawEmber() {
      if (!world) return;
      var r = ROOMS[world.current_location];
      if (!r) return;

      nixX += (tNixX - nixX) * 0.035;
      nixY += (tNixY - nixY) * 0.035;

      var ex = nixX + camX;
      var ey = nixY + camY;
      var bob = Math.sin(frame * 0.04) * 4;
      var flk = Math.sin(frame * 0.09) * 2;

      // Outer glow
      var g1 = ctx.createRadialGradient(ex, ey + bob, 0, ex, ey + bob, 90 + flk);
      g1.addColorStop(0, 'rgba(255,107,53,0.30)');
      g1.addColorStop(0.5, 'rgba(255,50,0,0.08)');
      g1.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g1;
      ctx.beginPath(); ctx.arc(ex, ey + bob, 90 + flk, 0, Math.PI * 2); ctx.fill();

      // Inner glow
      var g2 = ctx.createRadialGradient(ex, ey + bob, 0, ex, ey + bob, 28);
      g2.addColorStop(0, 'rgba(255,160,60,0.9)');
      g2.addColorStop(1, 'rgba(255,80,0,0)');
      ctx.fillStyle = g2;
      ctx.beginPath(); ctx.arc(ex, ey + bob, 28, 0, Math.PI * 2); ctx.fill();

      // Core
      ctx.fillStyle = '#FF6B35';
      ctx.beginPath(); ctx.arc(ex, ey + bob + flk, 9, 0, Math.PI * 2); ctx.fill();

      // Bright center
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.arc(ex - 2, ey - 3 + bob + flk, 3.5, 0, Math.PI * 2); ctx.fill();

      // Ember sparks
      if (Math.random() > 0.6) {
        parts.push({
          x: nixX + (Math.random() - 0.5) * 8,
          y: nixY + bob - 5,
          vx: (Math.random() - 0.5) * 0.6,
          vy: -Math.random() * 1.2 - 0.4,
          life: 35 + Math.random() * 35, max: 70,
          col: Math.random() > 0.5 ? '#FF6B35' : '#FFA500',
          sz: 1.2 + Math.random() * 1.8,
        });
      }
    }

    function doParticles() {
      // Ambient room particles
      if (Math.random() > 0.88) {
        for (var key in ROOMS) {
          if (Math.random() > 0.4) continue;
          var b = rr(key);
          var cur = isCurrent(key);
          var col, sz;

          if (key === 'hearth' && cur)       { col = 'rgba(255,107,53,0.45)'; sz = 2; }
          else if (key === 'hearth')         { col = 'rgba(255,107,53,0.25)'; sz = 1.2; }
          else if (key === 'garden')         { col = 'rgba(68,204,68,0.35)'; sz = 1.4; }
          else if (key === 'observatory')    { col = 'rgba(119,85,221,0.40)'; sz = 1; }
          else if (key === 'library')        { col = 'rgba(204,153,68,0.25)'; sz = 1; }
          else if (key === 'studio')         { col = 'rgba(68,136,255,0.25)'; sz = 1; }
          else if (key === 'workshop')       { col = 'rgba(170,170,170,0.20)'; sz = 1; }
          else continue;

          parts.push({
            x: b.x + 10 + Math.random() * (b.w - 20),
            y: b.y + 10 + Math.random() * (b.h - 20),
            vx: (Math.random() - 0.5) * 0.25,
            vy: (Math.random() - 0.5) * 0.25 - 0.15,
            life: 60 + Math.random() * 80, max: 140,
            col: col, sz: sz,
          });
        }
      }

      parts = parts.filter(function (p) {
        p.x += p.vx; p.y += p.vy; p.life--;
        if (p.life <= 0) return false;
        ctx.globalAlpha = p.life / p.max;
        ctx.fillStyle = p.col;
        ctx.fillRect(p.x + camX, p.y + camY, p.sz, p.sz);
        return true;
      });
      ctx.globalAlpha = 1;
    }

    // -----------------------------------------------------------------------
    // Nix movement
    // -----------------------------------------------------------------------

    function wander() {
      if (!world) return;
      var now = Date.now();
      if (now - lastMove < 3500 + Math.random() * 4000) return;

      var b = rr(world.current_location);
      tNixX = b.x + 50 + Math.random() * (b.w - 100);
      tNixY = b.y + 40 + Math.random() * (b.h - 80);
      lastMove = now;
    }

    function placeNix() {
      if (!world) return;
      var r = ROOMS[world.current_location];
      if (!r) return;
      nixX = tNixX = r.x;
      nixY = tNixY = r.y;
    }

    // -----------------------------------------------------------------------
    // Interaction
    // -----------------------------------------------------------------------

    function hitRoom(mx, my) {
      for (var key in ROOMS) {
        var b = rr(key);
        if (mx >= b.x + camX && mx <= b.x + b.w + camX &&
            my >= b.y + camY && my <= b.y + b.h + camY) return key;
      }
      return null;
    }

    canvas.addEventListener('mousemove', function (e) {
      hovered = hitRoom(e.clientX, e.clientY);
      canvas.style.cursor = hovered ? 'pointer' : 'default';
    });

    function onCanvasPick(clientX, clientY) {
      var hit = hitRoom(clientX, clientY);
      if (hit) {
        selected = selected === hit ? null : hit;
        panTo(ROOMS[hit].x, ROOMS[hit].y);
        showDetail(hit);
      } else {
        selected = null;
        hideDetail();
        var target = world ? ROOMS[world.current_location] : null;
        panTo(target ? target.x : 500, target ? target.y : 300);
      }
    }

    canvas.addEventListener('click', function (e) {
      if (Date.now() - lastTouchPick < 500) return;
      onCanvasPick(e.clientX, e.clientY);
    });

    canvas.addEventListener('touchend', function (e) {
      if (!e.changedTouches || !e.changedTouches.length) return;
      lastTouchPick = Date.now();
      var t = e.changedTouches[0];
      onCanvasPick(t.clientX, t.clientY);
      e.preventDefault();
    }, { passive: false });

    function showDetail(key) {
      var el = document.getElementById('room-info');
      if (!world || !world.rooms || !world.rooms[key]) { el.classList.remove('active'); return; }

      var room = world.rooms[key];
      var objs = room.objects || [];
      var cur = isCurrent(key);

      document.getElementById('ri-name').textContent = room.name + (cur ? ' \u25C6' : '');
      document.getElementById('ri-name').style.color = ROOMS[key].accent;
      document.getElementById('ri-desc').textContent = room.description || '';

      if (objs.length) {
        document.getElementById('ri-objects').textContent = objs.map(function (o) {
          var look = OBJ_LOOK[o.type] || {};
          var name = o.name || o.title || o.content || o.state || o.type;
          return '[' + (look.ch || '?') + '] ' + name;
        }).join('  \u00B7  ');
      } else {
        document.getElementById('ri-objects').textContent = 'Empty room';
      }

      el.classList.add('active');
    }

    function hideDetail() {
      document.getElementById('room-info').classList.remove('active');
    }

    // -----------------------------------------------------------------------
    // API
    // -----------------------------------------------------------------------

    function loadWorld() {
      fetch('/api/my-world')
        .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
        .then(function (data) {
          var changed = world && world.current_location !== data.current_location;
          world = data;

          document.getElementById('s-loc').textContent = roomLabel(data.current_location);
          document.getElementById('s-act').textContent = data.activity || '…';
          document.getElementById('s-mood').textContent = data.mood || '…';

          if (data.last_moved) {
            var m = Math.floor((Date.now() - new Date(data.last_moved)) / 60000);
            document.getElementById('s-moved').textContent =
              m < 1 ? 'just now' : m < 60 ? m + 'm ago' : Math.floor(m / 60) + 'h ago';
          }

          if (!nixX || changed) {
            placeNix();
            var r = ROOMS[data.current_location];
            if (r) panTo(r.x, r.y);
          }

          if (selected) showDetail(selected);
        })
        .catch(function () {
          if (!world || world === DEFAULT_WORLD) {
            world = DEFAULT_WORLD;
            document.getElementById('s-loc').textContent = roomLabel(DEFAULT_WORLD.current_location);
            document.getElementById('s-act').textContent = DEFAULT_WORLD.activity;
            document.getElementById('s-mood').textContent = DEFAULT_WORLD.mood;
            document.getElementById('s-moved').textContent = 'just now';
            placeNix();
          }
        });
    }

    // -----------------------------------------------------------------------
    // Main loop
    // -----------------------------------------------------------------------

    function loop() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      updateCam();
      drawGlows();
      drawCorridors();
      drawRooms();
      drawObjects();
      wander();
      drawEmber();
      doParticles();

      frame++;
      requestAnimationFrame(loop);
    }

    // Initialize from default state immediately
    placeNix();
    document.getElementById('s-loc').textContent = roomLabel(DEFAULT_WORLD.current_location);
    document.getElementById('s-act').textContent = DEFAULT_WORLD.activity;
    document.getElementById('s-mood').textContent = DEFAULT_WORLD.mood;
    document.getElementById('s-moved').textContent = 'just now';

    loadWorld();
    setInterval(loadWorld, POLL_MS);
    loop();
  })();
  </script>
</body>
</html>
